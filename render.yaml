services:
  - type: web
    name: eduai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/server/data/eduai.db
